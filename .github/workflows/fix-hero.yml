name: Fix hero section
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove loneliness line from hero
        run: |
          python3 << 'PYEOF'
          with open('index.html', 'r') as f:
              html = f.read()

          # Remove the loneliness line and its surrounding tag
          old = 'You have built something remarkable. And you still feel lonely. This room is for you.'
          if old in html:
              import re
              # Match the full element containing this text (likely a <p> tag)
              pattern = r'\s*<p[^>]*class="hero-loneliness"[^>]*>.*?' + re.escape(old) + r'.*?</p>'
              result = re.sub(pattern, '', html, flags=re.DOTALL)
              if result == html:
                  # Try without class attribute
                  pattern2 = r'\s*<p[^>]*>' + re.escape(old) + r'</p>'
                  result = re.sub(pattern2, '', html, flags=re.DOTALL)
              if result != html:
                  html = result
                  print('OK: Removed loneliness line with surrounding tag')
              else:
                  # Fallback: just remove the text itself
                  html = html.replace(old, '')
                  print('OK: Removed loneliness text (fallback)')
          else:
              print('WARNING: Loneliness line not found')

          with open('index.html', 'w') as f:
              f.write(html)
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "fix: remove loneliness line from hero to keep above-fold clean"
          git push
      - name: Clean up this workflow
        run: |
          git rm .github/workflows/fix-hero.yml
          git commit -m "Clean up: remove temporary hero fix workflow"
          git push
