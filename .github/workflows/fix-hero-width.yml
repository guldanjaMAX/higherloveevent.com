name: Fix hero width
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix hero max-width to 100%
        run: |
          python3 << 'PYEOF'
          import re
          with open('index.html', 'r') as f:
              html = f.read()

          # Find .hero.hero-split CSS rule and change max-width from 1280px to 100%
          old_rule = re.search(r'(\.hero\.hero-split\s*\{[^}]*?)max-width:\s*1280px', html, re.DOTALL)
          if old_rule:
              html = html[:old_rule.start()] + old_rule.group().replace('max-width: 1280px', 'max-width: 100%') + html[old_rule.end():]
              print('OK: Changed .hero.hero-split max-width from 1280px to 100%')
          else:
              # Try alternate spacing
              if 'max-width:1280px' in html or 'max-width: 1280px' in html:
                  html = html.replace('max-width:1280px', 'max-width:100%', 1)
                  html = html.replace('max-width: 1280px', 'max-width: 100%', 1)
                  print('OK: Replaced max-width 1280px with 100% (fallback)')
              else:
                  print('WARNING: Could not find max-width: 1280px rule')

          with open('index.html', 'w') as f:
              f.write(html)
          PYEOF
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "fix: hero background now stretches full viewport width on wide screens"
          git push
      - name: Clean up this workflow
        run: |
          git rm .github/workflows/fix-hero-width.yml
          git commit -m "Clean up: remove temporary hero width fix workflow"
          git push
