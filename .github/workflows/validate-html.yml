name: Validate HTML

on:
  push:
    branches-ignore:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build site with Eleventy
        run: npx @11ty/eleventy

      - name: Check built index.html exists and is not empty
        run: |
          if [ ! -f _site/index.html ]; then
            echo "FAIL: _site/index.html does not exist after Eleventy build"
            exit 1
          fi
          if [ ! -s _site/index.html ]; then
            echo "FAIL: _site/index.html is empty"
            exit 1
          fi
          echo "PASS: _site/index.html exists and is not empty"

      - name: Check built index.html is not suspiciously small
        run: |
          LINES=$(wc -l < _site/index.html)
          echo "_site/index.html has $LINES lines"
          if [ "$LINES" -lt 500 ]; then
            echo "FAIL: _site/index.html has only $LINES lines. Expected 500+. The Eleventy build may have failed to include all partials."
            exit 1
          fi
          echo "PASS: _site/index.html has $LINES lines (above 500 minimum)"

      - name: Check for critical page elements
        run: |
          ERRORS=0
          check_element() {
            if ! grep -qi "$1" _site/index.html; then
              echo "FAIL: Missing expected element: $2"
              ERRORS=$((ERRORS + 1))
            else
              echo "PASS: Found $2"
            fi
          }
          check_element "<!DOCTYPE html>" "DOCTYPE declaration"
          check_element "Higher Love" "Higher Love branding"
          check_element "hero" "Hero section"
          check_element "youtube.com/embed\|vimeo.com\|wistia\|video" "Video embed"
          check_element "application/ld+json" "Structured data (JSON-LD)"
          check_element "Apply Now\|APPLY NOW" "Apply Now CTA"
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAIL: $ERRORS critical elements missing from _site/index.html"
            exit 1
          fi
          echo "ALL CHECKS PASSED"

      - name: Check styles.css exists in build output
        run: |
          if [ ! -f _site/styles.css ]; then
            echo "FAIL: _site/styles.css does not exist in build output"
            exit 1
          fi
          echo "PASS: _site/styles.css exists"

      - name: Check all include partials exist in source
        run: |
          ERRORS=0
          for partial in head-meta head-styles body-open-nav hero letter host-experience pillars audience testimonials higher-community cta-form faq footer-scripts; do
            if [ ! -f "_includes/${partial}.html" ]; then
              echo "FAIL: Missing partial _includes/${partial}.html"
              ERRORS=$((ERRORS + 1))
            else
              echo "PASS: Found _includes/${partial}.html"
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAIL: $ERRORS include partials missing"
            exit 1
          fi
          echo "ALL PARTIALS PRESENT"
