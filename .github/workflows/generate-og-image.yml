name: Generate OG Image

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin imagemagick

      - name: Generate OG image
        run: |
          # Convert SVG to PNG with transparency
          rsvg-convert images/hls-logo-stacked.svg -w 600 -o /tmp/logo.png
          
          # Create black background 1200x630
          convert -size 1200x630 xc:black /tmp/bg.png
          
          # Get logo dimensions
          LOGO_W=$(identify -format '%w' /tmp/logo.png)
          LOGO_H=$(identify -format '%h' /tmp/logo.png)
          
          # Scale logo to fit nicely (max 500px wide, max 450px tall)
          convert /tmp/logo.png -resize 500x450 /tmp/logo-resized.png
          
          # Get resized dimensions for centering
          RESIZED_W=$(identify -format '%w' /tmp/logo-resized.png)
          RESIZED_H=$(identify -format '%h' /tmp/logo-resized.png)
          
          # Center logo on black background
          OFFSET_X=$(( (1200 - RESIZED_W) / 2 ))
          OFFSET_Y=$(( (630 - RESIZED_H) / 2 ))
          
          convert /tmp/bg.png /tmp/logo-resized.png -geometry +${OFFSET_X}+${OFFSET_Y} -composite images/og-logo-black.jpg
          
          echo "Generated OG image:"
          identify images/og-logo-black.jpg
          ls -la images/og-logo-black.jpg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/og-logo-black.jpg
          git commit -m "Generate OG image: black background with stacked HLS logo"
          git push origin dev
