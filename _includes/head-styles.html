  <!-- Pillar Grid + Dual CTA + HIGHER Horizontal Styles -->
  <style>

      display: grid;

      margin-top: 2.5rem;

    .pillar-card:hover .pillar-bg {

      background: linear-gradient(0deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.6) 45%, rgba(0,0,0,0.15) 100%);

    .pillar-card h3 {
      position: relative;
      z-index: 2;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
      margin-bottom: 0.6rem;

    }
    .pillar-card--wide {
      grid-column: 1 / -1;

    /* Full-bleed image treatment */

    @media (max-width: 1024px) {

    /* Cookie Consent Banner */
