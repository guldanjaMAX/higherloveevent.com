<!-- HERO — Editorial Luxe: Text Left, Video Right -->
<main id="main-content">
<section class="hero hero-split">
  <div class="hero-split-bg"></div>
  <div class="hero-accent-line"></div>
  <div class="hero-split-text">
    <h1>The World&rsquo;s First Brotherhood For Entrepreneurial Gay Men.</h1>
    <p class="hero-sub">A curated community of growth-oriented gay men in their late 30s, 40s, and 50s.</p>
    <div class="hero-cta-group" style="justify-content: flex-start;">
      <a href="#application-form" class="cta-button">Request An Invitation</a>
    </div>
  </div>
  <div class="hero-split-video">
    <div class="flame-container">
      <!-- Ambient glow behind video -->
      <div class="flame-glow-base"></div>

      <!-- SVG flame shapes rising behind video -->
      <div class="flame-svg-layer">
        <svg viewBox="0 0 600 500" preserveAspectRatio="none" fill="none">
          <path class="flame-path-1" d="M300 480 C280 400 200 350 220 250 C240 180 270 200 280 150 C290 100 300 50 310 100 C320 150 340 130 350 200 C370 280 310 300 320 350 C340 400 320 460 300 480Z" fill="url(#flameGrad1)"/>
          <path class="flame-path-2" d="M180 480 C170 420 120 380 140 300 C160 240 170 260 175 220 C180 180 190 160 195 200 C200 250 210 230 215 280 C225 340 200 360 195 400 C190 440 185 460 180 480Z" fill="url(#flameGrad2)"/>
          <path class="flame-path-3" d="M420 480 C410 430 450 380 440 310 C430 250 420 270 415 230 C410 190 405 170 400 210 C395 260 385 240 380 290 C370 350 390 370 400 410 C410 450 415 465 420 480Z" fill="url(#flameGrad2)"/>
          <path class="flame-path-2" d="M100 480 C95 440 70 400 85 350 C100 310 105 330 108 300 C110 280 112 270 115 290 C120 320 125 310 120 350 C115 390 110 410 105 440 C100 460 100 470 100 480Z" fill="url(#flameGrad3)"/>
          <path class="flame-path-1" d="M500 480 C505 440 530 400 515 350 C500 310 495 330 492 300 C490 280 488 270 485 290 C480 320 475 310 480 350 C485 390 490 410 495 440 C500 460 500 470 500 480Z" fill="url(#flameGrad3)"/>
          <defs>
            <linearGradient id="flameGrad1" x1="300" y1="480" x2="300" y2="50" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#C47B2B" stop-opacity="0.6"/>
              <stop offset="30%" stop-color="#D4A544" stop-opacity="0.4"/>
              <stop offset="60%" stop-color="#E8963E" stop-opacity="0.2"/>
              <stop offset="100%" stop-color="#D4A544" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="flameGrad2" x1="0" y1="480" x2="0" y2="160" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#C47B2B" stop-opacity="0.5"/>
              <stop offset="40%" stop-color="#D4A544" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="#E8963E" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="flameGrad3" x1="0" y1="480" x2="0" y2="270" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#915335" stop-opacity="0.4"/>
              <stop offset="50%" stop-color="#C47B2B" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#D4A544" stop-opacity="0"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <!-- CSS flame tongues rising from bottom -->
      <div class="flame-tongue"></div>
      <div class="flame-tongue"></div>
      <div class="flame-tongue"></div>
      <div class="flame-tongue"></div>
      <div class="flame-tongue"></div>

      <!-- Side flame wisps -->
      <div class="flame-wisp flame-wisp-left-1"></div>
      <div class="flame-wisp flame-wisp-left-2"></div>
      <div class="flame-wisp flame-wisp-right-1"></div>
      <div class="flame-wisp flame-wisp-right-2"></div>

      <!-- Top heat shimmer -->
      <div class="heat-shimmer"></div>

      <!-- Re's video with click-to-play and corner brackets -->
      <div class="video-decor-wrap">
        <div class="video-corner-bracket tl"></div>
        <div class="video-corner-bracket tr"></div>
        <div class="video-corner-bracket bl"></div>
        <div class="video-corner-bracket br"></div>
        <div id="video-wrapper" style="position: relative; width: 100%; border-radius: 12px; overflow: hidden; cursor: pointer; aspect-ratio: 16/9; background: #0a0a0a;" onclick="playInvitationVideo()">
          <video id="optin-video" preload="metadata" style="width: 100%; height: 100%; display: block; background: #0a0a0a; object-fit: cover;" playsinline>
            <source src="images/opt-in-video.mp4" type="video/mp4">
            Your browser does not support the video element.
          </video>
          <!-- Custom poster overlay -->
          <div id="video-poster-overlay" style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; transition: opacity 0.5s ease;" class="video-poster-editorial">
            <div class="play-circle-editorial">
              <svg width="34" height="38" viewBox="0 0 28 32" fill="none" style="margin-left: 5px;">
                <path d="M28 16L0 32V0L28 16Z" fill="#EDE3DA"/>
              </svg>
            </div>
            <p style="font-family: 'Raleway', sans-serif; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--linen); margin: 0.8rem 0 0; pointer-events: none; opacity: 0.7;">3 MIN &middot; THE STORY BEHIND HIGHER LOVE</p>
          </div>
        </div>
      </div>
      <p class="hero-video-caption" style="font-family: 'EB Garamond', serif; font-size: 0.95rem; font-style: italic; color: rgba(255,255,255,0.72); text-align: center; margin-top: 0.75rem;">Hear the story behind Higher Love directly from Re</p>
    </div>
  </div>

  <!-- Background ember particles -->
  <div class="ember-field" id="ember-field"></div>
</section>
